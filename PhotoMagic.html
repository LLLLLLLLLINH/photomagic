<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PhotoMagic ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--black:#0a0a0a;--gray3:#b0b0b0;--accent:#ff3b6b;--radius:16px;--radius-sm:10px}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:#fff;min-height:100vh;overflow-x:hidden;font-size:15px}
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:24px;text-align:center}
.logo{font-size:32px;font-weight:700;letter-spacing:-1px}.logo span{color:var(--accent)}
.tagline{font-size:14px;color:var(--gray3);margin-top:-16px}
.upload-box{width:100%;max-width:400px;border:2px dashed #333;border-radius:24px;padding:52px 24px;cursor:pointer;transition:all .2s;background:#111;display:flex;flex-direction:column;align-items:center;gap:18px}
.upload-box:hover{border-color:var(--accent);background:#1a0a0f}
.upload-icon{width:80px;height:80px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px}
.upload-box h2{font-size:22px;font-weight:700}.upload-box p{font-size:14px;color:var(--gray3)}
.pill-btn{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:15px 36px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:400px}
.pill-btn:active{transform:scale(.97)}
#editor-screen{display:none;flex-direction:column;min-height:100vh;max-width:500px;margin:0 auto}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--black);border-bottom:1px solid #1a1a1a;flex-shrink:0;position:sticky;top:0;z-index:10}
.tb-btn{background:#1a1a1a;border:none;color:#fff;border-radius:var(--radius-sm);padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.tb-btn:active{transform:scale(.95)}.tb-save{background:var(--accent)}.tb-title{font-size:16px;font-weight:700}
#canvas-area{position:relative;background:#111;width:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#canvas-area canvas{width:100%;height:100%;object-fit:contain;display:block}
#sticker-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.placed-sticker{position:absolute;font-size:44px;cursor:move;pointer-events:all;user-select:none;line-height:1;touch-action:none}
#bottom-panel{background:var(--black);border-top:1px solid #1a1a1a;flex-shrink:0;padding-bottom:max(16px,env(safe-area-inset-bottom,16px));position:sticky;bottom:0}
#tab-bar{display:flex;overflow-x:auto;padding:10px 14px 0;gap:6px;scrollbar-width:none;border-bottom:1px solid #1a1a1a}
#tab-bar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;color:var(--gray3);font-family:'DM Sans',sans-serif}
.tab.active{background:#1a1a1a;color:#fff}.tab-icon{font-size:20px;line-height:1}.tab-label{font-size:11px;font-weight:600}
#tool-content{padding:16px;min-height:200px;max-height:360px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 transparent}
.filter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.filter-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.filter-item:active{transform:scale(.93)}
.filter-item.active .filter-preview{border-color:var(--accent);border-width:3px}
.filter-preview{width:100%;aspect-ratio:1;border-radius:var(--radius-sm);border:2px solid #222;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:28px}
.filter-label{font-size:11px;font-weight:600;color:var(--gray3);text-align:center}
.filter-item.active .filter-label{color:#fff}
.slider-section{display:flex;flex-direction:column;gap:14px}
.slider-row{display:flex;flex-direction:column;gap:6px}
.slider-header{display:flex;justify-content:space-between;align-items:center}
.slider-name{font-size:14px;font-weight:600}
.slider-val{font-size:14px;font-weight:700;color:var(--accent);min-width:36px;text-align:right}
input[type=range]{width:100%;height:44px;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;touch-action:pan-y}
input[type=range]::-webkit-slider-runnable-track{background:#2a2a2a;border-radius:4px;height:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;margin-top:-11px;box-shadow:0 2px 10px rgba(0,0,0,.6)}
input[type=range]::-moz-range-track{background:#2a2a2a;border-radius:4px;height:6px}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;border:none}
.sticker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.sticker-btn{font-size:30px;text-align:center;padding:8px;border-radius:var(--radius-sm);background:#111;border:1px solid #222;cursor:pointer;line-height:1}
.sticker-btn:active{transform:scale(.8)}
.tools-panel{display:flex;flex-direction:column;gap:8px}
.tool-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#111;border:1.5px solid #222;border-radius:var(--radius);cursor:pointer;text-align:left;width:100%;font-family:'DM Sans',sans-serif}
.tool-btn:active{transform:scale(.98);background:#1a1a1a}
.tool-btn .t-icon{font-size:26px;flex-shrink:0;width:36px;text-align:center}
.tool-btn .t-title{font-size:14px;font-weight:700;color:#fff}
.tool-btn .t-sub{font-size:12px;color:var(--gray3);margin-top:2px}
.face-section-title{font-size:11px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.8px;margin-top:10px;margin-bottom:2px;padding-left:2px}
#loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:100}
.spinner{width:46px;height:46px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{font-size:14px;font-weight:600}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(10px);background:#fff;color:#000;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="upload-screen">
  <div class="logo">Photo<span>Magic</span> ✨</div>
  <p class="tagline">100% offline · No account · No internet needed</p>
  <div class="upload-box" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📷</div>
    <h2>Add Your Photo</h2>
    <p>Tap to choose from your gallery or camera roll</p>
  </div>
  <button class="pill-btn" onclick="document.getElementById('file-input').click()">Choose Photo</button>
</div>

<div id="editor-screen">
  <div id="topbar">
    <button class="tb-btn" onclick="newPhoto()">← New</button>
    <span class="tb-title">PhotoMagic ✨</span>
    <button class="tb-btn tb-save" onclick="downloadImage()">Save ↓</button>
  </div>
  <div id="canvas-area">
    <canvas id="canvas"></canvas>
    <div id="sticker-layer"></div>
    <div id="loading-overlay"><div class="spinner"></div><div id="loading-text">Working...</div></div>
  </div>
  <div id="bottom-panel">
    <div id="tab-bar">
      <button class="tab active" onclick="switchTab('filters')" id="t-filters"><span class="tab-icon">🎨</span><span class="tab-label">Filters</span></button>
      <button class="tab" onclick="switchTab('adjust')"   id="t-adjust"><span class="tab-icon">✨</span><span class="tab-label">Adjust</span></button>
      <button class="tab" onclick="switchTab('facetune')" id="t-facetune"><span class="tab-icon">💆</span><span class="tab-label">Facetune</span></button>
      <button class="tab" onclick="switchTab('effects')"  id="t-effects"><span class="tab-icon">🌈</span><span class="tab-label">Effects</span></button>
      <button class="tab" onclick="switchTab('tools')"    id="t-tools"><span class="tab-icon">🛠️</span><span class="tab-label">Tools</span></button>
      <button class="tab" onclick="switchTab('stickers')" id="t-stickers"><span class="tab-icon">🎉</span><span class="tab-label">Stickers</span></button>
    </div>
    <div id="tool-content"></div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none">
<div id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let origPixels = null;
let imgW = 0, imgH = 0;
let stickers = [];
let currentTab = 'filters';
let activeFilter = 'none';
let adj  = {brightness:0,contrast:0,saturation:0,warmth:0,glow:0,fade:0,vignette:0,tint:0,clarity:0};
let face = {slim:0,widen:0,smooth:0,glow:0,skinTone:0,whiten:0,eyeBright:0};

// WARP: inverse-mapping so slim compresses, widen expands
// SLIM:  srcX = cx + dx / scale  (scale<1 → srcX outside bounds → edges fill, face narrows)
// WIDEN: srcX = cx + dx * scale  (scale<1 → srcX toward centre → content stretches wider)
function warpPixels(src, w, h, slimT, widenT) {
  const out=new Uint8ClampedArray(w*h*4), cx=w/2;
  const yTop=h*.12, yBot=h*.88, yFth=h*.14;
  for(let y=0;y<h;y++){
    let yM=0;
    if(y>yTop&&y<yBot){const d=Math.min(y-yTop,yBot-y,yFth);yM=.5-.5*Math.cos(Math.PI*d/yFth);}
    const row=y*w;
    for(let x=0;x<w;x++){
      const dx=x-cx;
      let srcX;
      if(slimT>0&&yM>0){const s=1-slimT*yM*.6;srcX=cx+dx/s;}
      else if(widenT>0&&yM>0){const s=1-widenT*yM*.4;srcX=cx+dx*s;}
      else{srcX=x;}
      srcX=Math.max(0,Math.min(w-1.0001,srcX));
      const x0=srcX|0,x1=Math.min(x0+1,w-1),f=srcX-x0;
      const s0=(row+x0)*4,s1=(row+x1)*4,di=(row+x)*4;
      out[di]  =src[s0]  +(src[s1]  -src[s0]  )*f;
      out[di+1]=src[s0+1]+(src[s1+1]-src[s0+1])*f;
      out[di+2]=src[s0+2]+(src[s1+2]-src[s0+2])*f;
      out[di+3]=255;
    }
  }
  return out;
}

function clamp(v){return v<0?0:v>255?255:v}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;}
  return[h*360,s*100,l*100];
}
function colourProcess(src,w,h,a,fa){
  const out=new Uint8ClampedArray(w*h*4);
  const cF=(259*(a.contrast+255))/(255*(259-a.contrast));
  const bF=a.brightness*2.55,sF=1+a.saturation/100;
  const glA=a.glow/100,fdA=a.fade/100,clA=a.clarity/60;
  for(let i=0;i<src.length;i+=4){
    let r=src[i],g=src[i+1],b=src[i+2];
    r=cF*(r-128)+128+bF;g=cF*(g-128)+128+bF;b=cF*(b-128)+128+bF;
    r+=a.warmth*.7;b-=a.warmth*.7;
    g+=a.tint*.25;r-=a.tint*.08;b-=a.tint*.08;
    const gr=.299*r+.587*g+.114*b;
    r=gr+sF*(r-gr);g=gr+sF*(g-gr);b=gr+sF*(b-gr);
    if(glA>0){const lm=(r+g+b)/3,hl=Math.max(0,(lm-80)/175);r+=glA*25*hl;g+=glA*18*hl;b+=glA*10*hl;}
    if(fdA>0){const f=fdA*40;r=r*(1-f/255)+f;g=g*(1-f/255)+f;b=b*(1-f/255)+f;}
    if(clA!==0){const lm2=(.299*r+.587*g+.114*b)/255,mm=4*lm2*(1-lm2);r+=(r-gr)*clA*mm*.5;g+=(g-gr)*clA*mm*.5;b+=(b-gr)*clA*mm*.5;}
    if(fa){
      const[h,s,l]=rgbToHsl(clamp(r),clamp(g),clamp(b));
      const sk=h>5&&h<42&&s>12&&s<78&&l>18&&l<92;
      if(sk){
        if(fa.smooth>0){const sm=fa.smooth/100;r+=(185-r)*sm*.22;g+=(145-g)*sm*.18;b+=(115-b)*sm*.12;}
        if(fa.glow>0){r+=fa.glow/100*18;g+=fa.glow/100*12;b+=fa.glow/100*6;}
        if(fa.skinTone){r+=fa.skinTone*.5;g+=fa.skinTone*.12;}
        if(fa.whiten>0){const wh=fa.whiten/100;r+=(255-r)*wh*.18;g+=(255-g)*wh*.16;b+=(255-b)*wh*.14;}
        if(fa.eyeBright>0&&l<45){const eb=fa.eyeBright/100;r+=(255-r)*eb*.22;g+=(255-g)*eb*.22;b+=(255-b)*eb*.22;}
      }
    }
    out[i]=clamp(r);out[i+1]=clamp(g);out[i+2]=clamp(b);out[i+3]=255;
  }
  return out;
}

function applyAll(){
  if(!origPixels)return;
  let px;
  if(face.slim>0||face.widen>0)px=warpPixels(origPixels,imgW,imgH,face.slim/100,face.widen/100);
  else px=origPixels.slice();
  ctx.putImageData(new ImageData(colourProcess(px,imgW,imgH,adj,face),imgW,imgH),0,0);
  if(adj.vignette>0){
    const cx=imgW/2,cy=imgH/2,rad=Math.max(cx,cy)*1.4;
    const gr=ctx.createRadialGradient(cx,cy,rad*(1-adj.vignette/115),cx,cy,rad);
    gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,`rgba(0,0,0,${adj.vignette/100*.8})`);
    ctx.fillStyle=gr;ctx.fillRect(0,0,imgW,imgH);
  }
}

const FILTERS=[
  {id:'none',  name:'Original',e:'🖼️',adj:{}},
  {id:'glow',  name:'Glow',    e:'✨',adj:{brightness:8,contrast:8,saturation:12,glow:40}},
  {id:'vivid', name:'Vivid',   e:'🌈',adj:{saturation:35,contrast:15,brightness:3}},
  {id:'rosy',  name:'Rosy',    e:'🌸',adj:{warmth:25,saturation:10,brightness:8,fade:10}},
  {id:'dreamy',name:'Dreamy',  e:'☁️',adj:{brightness:15,saturation:-10,fade:22,contrast:-8}},
  {id:'golden',name:'Golden',  e:'🌅',adj:{warmth:45,saturation:15,brightness:4,contrast:8}},
  {id:'ice',   name:'Ice',     e:'❄️',adj:{warmth:-35,saturation:8,brightness:4,contrast:12}},
  {id:'drama', name:'Drama',   e:'🎭',adj:{contrast:30,saturation:10,brightness:-8,vignette:50}},
  {id:'bw',    name:'B&W',     e:'🖤',adj:{saturation:-100,contrast:18}},
  {id:'vintage',name:'Vintage',e:'📷',adj:{warmth:22,saturation:-25,fade:20,contrast:8}},
  {id:'matte', name:'Matte',   e:'🤍',adj:{contrast:-18,brightness:12,fade:30,saturation:-8}},
  {id:'kawaii',name:'Kawaii',  e:'🎀',adj:{brightness:18,saturation:22,warmth:15,glow:30,fade:8}},
  {id:'peach', name:'Peachy',  e:'🍑',adj:{warmth:38,brightness:14,saturation:18,fade:14}},
  {id:'fairy', name:'Fairy',   e:'🧚',adj:{brightness:22,saturation:14,glow:55,fade:16}},
  {id:'moody', name:'Moody',   e:'🌙',adj:{brightness:-15,contrast:20,saturation:8,warmth:-10,vignette:35}},
  {id:'lomo',  name:'Lomo',    e:'🎞️',adj:{contrast:25,saturation:25,vignette:60,warmth:12}},
];
const ADJUST_SLIDERS=[
  {k:'brightness',label:'Brightness',min:-100,max:100},
  {k:'contrast',  label:'Contrast',  min:-100,max:100},
  {k:'saturation',label:'Color',     min:-100,max:100},
  {k:'warmth',    label:'Warmth',    min:-100,max:100},
  {k:'glow',      label:'Glow',      min:0,   max:100},
  {k:'fade',      label:'Fade',      min:0,   max:100},
  {k:'clarity',   label:'Clarity',   min:-50, max:50},
];
const FACE_SLIDERS=[
  {k:'slim',     label:'Slim / Narrow Face', min:0,  max:100,section:'Shape'},
  {k:'widen',    label:'Widen / Fuller Face',min:0,  max:100,section:'Shape'},
  {k:'smooth',   label:'Smooth Skin',        min:0,  max:100,section:'Skin'},
  {k:'glow',     label:'Skin Glow',          min:0,  max:100,section:'Skin'},
  {k:'skinTone', label:'Skin Tone',          min:-50,max:50, section:'Skin'},
  {k:'whiten',   label:'Brighten Skin',      min:0,  max:100,section:'Skin'},
  {k:'eyeBright',label:'Eye Brighten',       min:0,  max:100,section:'Eyes'},
];
const EFFECTS_SLIDERS=[
  {k:'vignette',label:'Vignette',min:0,  max:100},
  {k:'tint',    label:'Tint',   min:-100,max:100},
];
const STICKERS=['🌸','🌺','⭐','✨','💖','💕','🌈','🎀','🦋','🌙','🍓','🌷','💫','🎊','🦄','🍒','🌻','💎','🔥','🎵','🌊','🍀','💐','🌟','👑','🍭','😍','🥰','😎','🤩','💅','🫶'];

function switchTab(id){currentTab=id;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('t-'+id).classList.add('active');renderTab(id);}
function renderTab(id){const el=document.getElementById('tool-content');if(id==='filters')el.innerHTML=renderFilters();else if(id==='adjust')el.innerHTML=renderSliders(ADJUST_SLIDERS,adj,'adj');else if(id==='facetune')el.innerHTML=renderFacetune();else if(id==='effects')el.innerHTML=renderSliders(EFFECTS_SLIDERS,adj,'adj');else if(id==='tools')el.innerHTML=renderTools();else if(id==='stickers')el.innerHTML=renderStickers();attachSliders();}
function renderFilters(){return`<div class="filter-grid">${FILTERS.map(f=>`<div class="filter-item ${activeFilter===f.id?'active':''}" onclick="applyFilter('${f.id}')"><div class="filter-preview">${f.e}</div><span class="filter-label">${f.name}</span></div>`).join('')}</div>`;}
function renderSliders(defs,store,sk){return`<div class="slider-section">${defs.map(s=>`<div class="slider-row"><div class="slider-header"><span class="slider-name">${s.label}</span><span class="slider-val" id="sv-${s.k}">${Math.round(store[s.k]||0)}</span></div><input type="range" min="${s.min}" max="${s.max}" value="${store[s.k]||0}" data-key="${s.k}" data-store="${sk}" class="adj-slider"></div>`).join('')}</div>`;}
function renderFacetune(){let html='<div class="slider-section">',last='';FACE_SLIDERS.forEach(s=>{if(s.section!==last){html+=`<div class="face-section-title">${s.section}</div>`;last=s.section;}html+=`<div class="slider-row"><div class="slider-header"><span class="slider-name">${s.label}</span><span class="slider-val" id="sv-${s.k}">${Math.round(face[s.k]||0)}</span></div><input type="range" min="${s.min}" max="${s.max}" value="${face[s.k]||0}" data-key="${s.k}" data-store="face" class="adj-slider"></div>`;});return html+'</div>';}
function renderTools(){return`<div class="tools-panel"><div class="tool-btn" onclick="doAutoEnhance()"><span class="t-icon">⚡</span><div><div class="t-title">Auto Enhance</div><div class="t-sub">Smart scene-adaptive boost</div></div></div><div class="tool-btn" onclick="doRemoveBg()"><span class="t-icon">✂️</span><div><div class="t-title">Remove Background</div><div class="t-sub">Works best on solid-colour backgrounds</div></div></div><div class="tool-btn" onclick="doPortraitBlur()"><span class="t-icon">💆</span><div><div class="t-title">Portrait Blur</div><div class="t-sub">Blur background, keep subject sharp</div></div></div><div class="tool-btn" onclick="doCartoon()"><span class="t-icon">🎨</span><div><div class="t-title">Cartoonify</div><div class="t-sub">Posterise + outline effect</div></div></div><div class="tool-btn" onclick="doFlipH()"><span class="t-icon">↔️</span><div><div class="t-title">Flip Horizontal</div><div class="t-sub">Mirror left-right</div></div></div><div class="tool-btn" onclick="doFlipV()"><span class="t-icon">↕️</span><div><div class="t-title">Flip Vertical</div><div class="t-sub">Mirror top-bottom</div></div></div><div class="tool-btn" onclick="doRotate()"><span class="t-icon">🔄</span><div><div class="t-title">Rotate 90°</div><div class="t-sub">Rotate clockwise</div></div></div><div class="tool-btn" onclick="resetAll()"><span class="t-icon">↩️</span><div><div class="t-title">Reset All Edits</div><div class="t-sub">Start fresh from original</div></div></div></div>`;}
function renderStickers(){return`<div class="sticker-grid">${STICKERS.map(s=>`<div class="sticker-btn" onclick="placeSticker('${s}')">${s}</div>`).join('')}</div>`;}
function attachSliders(){document.querySelectorAll('.adj-slider').forEach(inp=>{inp.addEventListener('input',function(){const k=this.dataset.key,st=this.dataset.store,v=parseFloat(this.value);if(st==='face')face[k]=v;else adj[k]=v;const lbl=document.getElementById('sv-'+k);if(lbl)lbl.textContent=Math.round(v);applyAll();});});}
function applyFilter(id){const f=FILTERS.find(x=>x.id===id);if(!f)return;activeFilter=id;adj={brightness:0,contrast:0,saturation:0,warmth:0,glow:0,fade:0,vignette:0,tint:0,clarity:0};Object.assign(adj,f.adj);applyAll();renderTab('filters');toast(f.name+' applied');}

function doAutoEnhance(){
  if(!origPixels){toast('Upload a photo first!');return;}
  showLoading('Analysing photo...');
  setTimeout(()=>{
    const n=imgW*imgH;let sR=0,sG=0,sB=0,sL=0;const hist=new Int32Array(256);
    for(let i=0;i<origPixels.length;i+=4){const r=origPixels[i],g=origPixels[i+1],b=origPixels[i+2];sR+=r;sG+=g;sB+=b;const l=Math.round(.299*r+.587*g+.114*b);sL+=l;hist[l]++;}
    const aR=sR/n,aG=sG/n,aB=sB/n,aL=sL/n;
    let lo=0,hi=255,acc=0;const clip=n*.01;
    for(let i=0;i<256;i++){acc+=hist[i];if(acc>=clip){lo=i;break;}}
    acc=0;for(let i=255;i>=0;i--){acc+=hist[i];if(acc>=clip){hi=i;break;}}
    const range=hi-lo;
    adj.brightness+=aL<90?Math.min(20,(90-aL)*.25):aL>165?Math.max(-12,(165-aL)*.18):0;
    adj.contrast+=range<120?Math.min(16,(120-range)*.13):4;
    adj.saturation+=Math.max(aR,aG,aB)-Math.min(aR,aG,aB)>80?-6:10;
    adj.warmth+=-((aR-aB)*.1);adj.glow+=10;adj.clarity+=7;
    face.smooth=Math.min(face.smooth+20,50);
    hideLoading();applyAll();toast('Enhanced! ⚡');
  },100);
}
function doRemoveBg(){
  if(!origPixels){toast('Upload a photo first!');return;}
  showLoading('Removing background...');
  setTimeout(()=>{
    const w=imgW,h=imgH,tmp=ctx.getImageData(0,0,w,h),d=tmp.data;
    const pts=[[0,0],[w-1,0],[0,h-1],[w-1,h-1],[w>>1,0],[0,h>>1]];
    let bR=0,bG=0,bB=0;pts.forEach(([x,y])=>{const i=(y*w+x)*4;bR+=d[i];bG+=d[i+1];bB+=d[i+2];});
    bR/=pts.length;bG/=pts.length;bB/=pts.length;
    for(let i=0;i<d.length;i+=4){const dr=d[i]-bR,dg=d[i+1]-bG,db=d[i+2]-bB,dist=Math.sqrt(dr*dr+dg*dg+db*db);if(dist<80)d[i+3]=Math.max(0,(255*(dist/80)-20)|0);}
    ctx.putImageData(tmp,0,0);hideLoading();toast('Background removed ✂️');
  },100);
}
function doPortraitBlur(){
  if(!origPixels){toast('Upload a photo first!');return;}
  showLoading('Blurring background...');
  setTimeout(()=>{
    const w=imgW,h=imgH,src=ctx.getImageData(0,0,w,h),d=src.data,out=ctx.createImageData(w,h);
    const cx=w/2,cy=h*.38;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){const dist=Math.sqrt((x-cx)**2*.45+(y-cy)**2),bs=Math.max(0,(dist-75)/140);if(bs<.01){const si=(y*w+x)*4;out.data[si]=d[si];out.data[si+1]=d[si+1];out.data[si+2]=d[si+2];out.data[si+3]=255;}else{const rx=Math.round((Math.random()-.5)*9*bs),ry=Math.round((Math.random()-.5)*9*bs),sx=Math.max(0,Math.min(w-1,x+rx)),sy=Math.max(0,Math.min(h-1,y+ry)),si=(sy*w+sx)*4,di=(y*w+x)*4;out.data[di]=d[si];out.data[di+1]=d[si+1];out.data[di+2]=d[si+2];out.data[di+3]=255;}}
    ctx.putImageData(out,0,0);hideLoading();toast('Portrait blur! 💆');
  },100);
}
function doCartoon(){
  if(!origPixels){toast('Upload a photo first!');return;}
  showLoading('Cartoonifying...');
  setTimeout(()=>{
    const w=imgW,h=imgH,src=ctx.getImageData(0,0,w,h),d=src.data,lv=5;
    for(let i=0;i<d.length;i+=4){d[i]=Math.round(d[i]/255*(lv-1))*(255/(lv-1));d[i+1]=Math.round(d[i+1]/255*(lv-1))*(255/(lv-1));d[i+2]=Math.round(d[i+2]/255*(lv-1))*(255/(lv-1));}
    ctx.putImageData(src,0,0);
    const s2=ctx.getImageData(0,0,w,h),out=ctx.createImageData(w,h);
    for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const i=(y*w+x)*4,gx=Math.abs(s2.data[(y*w+x+1)*4]-s2.data[(y*w+x-1)*4]),gy=Math.abs(s2.data[((y+1)*w+x)*4]-s2.data[((y-1)*w+x)*4]);if(Math.sqrt(gx*gx+gy*gy)>28){out.data[i]=out.data[i+1]=out.data[i+2]=0;out.data[i+3]=200;}else{out.data[i]=s2.data[i];out.data[i+1]=s2.data[i+1];out.data[i+2]=s2.data[i+2];out.data[i+3]=255;}}
    ctx.putImageData(out,0,0);hideLoading();toast('Cartoon! 🎨');
  },100);
}
function doFlipH(){
  if(!origPixels){toast('Upload a photo first!');return;}
  const w=imgW,h=imgH,tmp=new Uint8ClampedArray(origPixels.length);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const si=(y*w+(w-1-x))*4,di=(y*w+x)*4;tmp[di]=origPixels[si];tmp[di+1]=origPixels[si+1];tmp[di+2]=origPixels[si+2];tmp[di+3]=origPixels[si+3];}
  origPixels=tmp;applyAll();toast('Flipped ↔️');
}
function doFlipV(){
  if(!origPixels){toast('Upload a photo first!');return;}
  const w=imgW,h=imgH,tmp=new Uint8ClampedArray(origPixels.length);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const si=((h-1-y)*w+x)*4,di=(y*w+x)*4;tmp[di]=origPixels[si];tmp[di+1]=origPixels[si+1];tmp[di+2]=origPixels[si+2];tmp[di+3]=origPixels[si+3];}
  origPixels=tmp;applyAll();toast('Flipped ↕️');
}
function doRotate(){
  if(!origPixels){toast('Upload a photo first!');return;}
  const w=imgW,h=imgH,tmp=new Uint8ClampedArray(w*h*4);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const si=(y*w+x)*4,nx=h-1-y,ny=x,di=(ny*h+nx)*4;tmp[di]=origPixels[si];tmp[di+1]=origPixels[si+1];tmp[di+2]=origPixels[si+2];tmp[di+3]=origPixels[si+3];}
  imgW=h;imgH=w;canvas.width=imgW;canvas.height=imgH;
  document.getElementById('canvas-area').style.height=Math.min(imgH,340)+'px';
  origPixels=tmp;applyAll();toast('Rotated 🔄');
}
function resetAll(){
  if(!origPixels){toast('Upload a photo first!');return;}
  adj={brightness:0,contrast:0,saturation:0,warmth:0,glow:0,fade:0,vignette:0,tint:0,clarity:0};
  face={slim:0,widen:0,smooth:0,glow:0,skinTone:0,whiten:0,eyeBright:0};
  activeFilter='none';applyAll();renderTab(currentTab);toast('Reset ↩️');
}

function placeSticker(emoji){
  if(!origPixels){toast('Upload a photo first!');return;}
  const area=document.getElementById('canvas-area');
  const el=document.createElement('div');el.className='placed-sticker';el.textContent=emoji;
  el.style.left=(area.offsetWidth/2-22)+'px';el.style.top=(area.offsetHeight/2-22)+'px';
  makeDraggable(el);document.getElementById('sticker-layer').appendChild(el);stickers.push(el);toast('Drag sticker anywhere!');
}
function makeDraggable(el){
  let ox,oy,sx,sy;
  el.addEventListener('mousedown',e=>{e.preventDefault();ox=el.offsetLeft;oy=el.offsetTop;sx=e.clientX;sy=e.clientY;const mv=ev=>{el.style.left=(ox+ev.clientX-sx)+'px';el.style.top=(oy+ev.clientY-sy)+'px'};const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up)};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
  el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];ox=el.offsetLeft;oy=el.offsetTop;sx=t.clientX;sy=t.clientY;const mv=ev=>{const t2=ev.touches[0];el.style.left=(ox+t2.clientX-sx)+'px';el.style.top=(oy+t2.clientY-sy)+'px'};const up=()=>{document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up)};document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);});
}

function showLoading(msg){document.getElementById('loading-text').textContent=msg;document.getElementById('loading-overlay').style.display='flex';}
function hideLoading(){document.getElementById('loading-overlay').style.display='none';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function downloadImage(){
  if(!origPixels){toast('Upload a photo first!');return;}
  const tmp=document.createElement('canvas');tmp.width=imgW;tmp.height=imgH;
  const tc=tmp.getContext('2d');tc.drawImage(canvas,0,0);
  const area=document.getElementById('canvas-area');
  const scX=imgW/area.offsetWidth,scY=imgH/area.offsetHeight;
  stickers.forEach(s=>{tc.font=`${44*Math.max(scX,scY)}px serif`;tc.fillText(s.textContent,parseFloat(s.style.left)*scX,parseFloat(s.style.top)*scY+44*scY);});
  const a=document.createElement('a');a.download='photomagic.png';a.href=tmp.toDataURL('image/png');a.click();toast('Saved! 🎉');
}
function newPhoto(){
  document.getElementById('editor-screen').style.display='none';
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('sticker-layer').innerHTML='';
  stickers=[];origPixels=null;imgW=0;imgH=0;
  adj={brightness:0,contrast:0,saturation:0,warmth:0,glow:0,fade:0,vignette:0,tint:0,clarity:0};
  face={slim:0,widen:0,smooth:0,glow:0,skinTone:0,whiten:0,eyeBright:0};
  activeFilter='none';document.getElementById('file-input').value='';
}

document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const img=new Image();
  img.onload=()=>{
    const maxW=480,maxH=340;let w=img.width,h=img.height;
    if(w>maxW){h=h*maxW/w;w=maxW;}if(h>maxH){w=w*maxH/h;h=maxH;}
    imgW=Math.round(w);imgH=Math.round(h);
    canvas.width=imgW;canvas.height=imgH;
    document.getElementById('canvas-area').style.height=imgH+'px';
    ctx.drawImage(img,0,0,imgW,imgH);
    const id=ctx.getImageData(0,0,imgW,imgH);
    origPixels=new Uint8ClampedArray(id.data);
    document.getElementById('upload-screen').style.display='none';
    document.getElementById('editor-screen').style.display='flex';
    currentTab='filters';renderTab('filters');toast('Ready! ✨');
  };
  img.src=URL.createObjectURL(file);
});
</script>
